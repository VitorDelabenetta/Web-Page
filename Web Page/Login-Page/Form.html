<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Login Page</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulário responsivo simples, onde o usuário tem a possibilidade de conexão com o serviço.">
    <meta name="author" content="Gabriel Delabenetta">
    
    <link rel="stylesheet" type="text/css" href="/Login-Page/Style.css">
</head>

    <!-- Esta é uma página de simulação de um formulário de inscrição -->

<body>
    <div class="login">
        <div class="login-left">
            <h1>Seja bem-vindo!</h1>
            <h2>Acesse nossos serviços</h2>
        </div>

        <form class="main-login-elements">
            <div class="login-right">
                <h1>Faça seu Login</h1>

                <div class="login-right-elements">
                    <label for="usuario">Usuário</label>
                    <input type="text" name="User" placeholder="Nome completo"></input>
                </div>
                <div class="login-right-elements">
                    <label for="senha">Senha</label>
                    <input type="password" name="Senha" placeholder="Insira sua senha"></input>
                </div>
                <input class="btn" type="submit" value="Login"></input>
            </div>
        </form>
    </div>
</body>
</html>
